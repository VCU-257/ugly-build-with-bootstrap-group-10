<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Bucket Overview</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        
    </head>

    <body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <main>
            <div class="bg-info text-dark rounded-bottom" style="max-width: 25rem;">
                <h1 class="text-center" style="max-width: 25rem;">My First Bucket</h1>
            </div>
            <div id="bucket-progress" class="container border border-secondary rounded-top" style="margin: 5px 0px 5px 0px; max-width: 25rem;">
                <div class="row">
                    <h4 class="col-3" style="margin: 3px;">Progress</h4>
                    <div class="col-8">
                        <div class="progress" role="progressbar" aria-label="bucket progress" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" style="max-width: 16rem; margin: 1em 0px 1em 0px;">
                            <div class="progress-bar text-bg-primary progress-bar-striped progress-bar-animated" style="width: 75%; max-width: 16rem;">75%</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="participants" class="container border border-secondary" style="max-width: 25rem; margin: 0;">

                <div class="row border-bottom border-secondary" style="margin:5px 0px 5px 0px;">
                    <h2 class="text-center">Participants</h2>
                </div>
                
                <ul class="container">
                    <div class="row">
                        <h6 class="col-9">Steffen N.</h6>
                        <span class="col-2 badge text-bg-success rounded-pill" style="max-height: 20px;">$50/$50</span>
                    </div>
                    <div class="row">
                        <h6 class="col-9">John D.</h6>
                        <span class="col-2 badge text-bg-primary rounded-pill" style="max-height: 20px;">$25/$50</span>
                    </li>
                </ul>
            </div>

            <div id="transactions" class="container border border-secondary rounded-bottom" style="margin: 5px 0px 0px 0px; max-width: 25rem;">
                <div class="row border-bottom border-secondary" style="margin: 5px 0px 5px 0px;">
                    <h2 class="text-center">Recent Transactions</h2>
                </div>
                
                <div id="transaction-1">
                    <p>Steffen N. added $32 to My First Bucket</p>
                </div>
                <div id="load-more-dialog">
                    <a href=".">Load more transactions</a>
                </div>
            </div>
        </main>
        
        <div id="navbar-container"></div>
    </body>
</html>
